name: Build web image

# Build the Next.js (frontend) Docker image on GitHub's runners and push it to
# GHCR, so the 1 GB production VPS never has to run `next build` — it only pulls
# the finished image.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build.yml'
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository }}-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
