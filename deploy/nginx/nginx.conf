# Public entrypoint: terminates TLS and routes between Django and Next.js.
#   /api /admin /static /media /ckeditor5  -> backend (Django, gunicorn :8000)
#   everything else (incl. /_next)         -> web (Next.js :3000)

server {
  listen 80;
  server_name dusr.sa www.dusr.sa 82.223.81.234 _;

  # Let's Encrypt ACME HTTP-01 challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect all other traffic to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name dusr.sa www.dusr.sa 82.223.81.234 _;

  ssl_certificate /etc/letsencrypt/live/dusr.sa/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dusr.sa/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  # Allow file uploads (CVs, CKEditor images) through to Django.
  client_max_body_size 25m;

  # --- Django: admin, API, static, media, rich-text editor ---
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /admin/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /static/ {
    proxy_pass http://backend:8000;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /media/ {
    proxy_pass http://backend:8000;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ckeditor5/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- Next.js: the public site (everything else, including /_next assets) ---
  location / {
    proxy_pass http://web:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
