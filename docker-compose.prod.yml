services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      DJANGO_SETTINGS_MODULE: goldenMeatPortfolio.settings.prod
      DJANGO_ALLOWED_HOSTS: dusr.sa,www.dusr.sa,82.223.81.234
      DJANGO_CSRF_TRUSTED_ORIGINS: https://dusr.sa,https://www.dusr.sa,http://82.223.81.234
      DJANGO_DB_PATH: /app/data/db.sqlite3
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY before starting production}
    volumes:
      - backend_media:/app/media
      - backend_staticfiles:/app/staticfiles
      - backend_data:/app/data

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    depends_on:
      - backend
    environment:
      # Same-origin in the browser (nginx serves /api); internal URL for SSR/ISR.
      NEXT_PUBLIC_API_BASE_URL: ""
      API_INTERNAL_URL: http://backend:8000

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  backend_media:
  backend_staticfiles:
  backend_data:
  certbot_conf:
  certbot_www:
