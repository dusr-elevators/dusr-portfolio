services:
  backend:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      DJANGO_SETTINGS_MODULE: goldenMeatPortfolio.settings.prod
      # Include Docker service names because the Next.js server fetches the API
      # over the internal compose network during SSR/ISR.
      DJANGO_ALLOWED_HOSTS: dusr.sa,www.dusr.sa,82.223.81.234,backend
      DJANGO_CSRF_TRUSTED_ORIGINS: https://dusr.sa,https://www.dusr.sa,http://82.223.81.234
      DJANGO_DB_PATH: /app/data/db.sqlite3
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY before starting production}
      # TLS is terminated and HTTP->HTTPS is enforced by nginx. Keeping Django's
      # redirect off prevents internal HTTP calls from the web container from
      # being redirected to HTTPS on the plain gunicorn port.
      DJANGO_SECURE_SSL_REDIRECT: "false"
    volumes:
      - backend_media:/app/media
      - backend_staticfiles:/app/staticfiles
      - backend_data:/app/data

  web:
    # Prebuilt by GitHub Actions (.github/workflows/build.yml) and pulled here —
    # the 1 GB VPS never runs `next build`. Requires `docker login ghcr.io` once.
    image: ghcr.io/dusr-elevators/dusr-portfolio-web:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Same-origin in the browser (nginx serves /api); internal URL for SSR/ISR.
      NEXT_PUBLIC_API_BASE_URL: ""
      API_INTERNAL_URL: http://backend:8000

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  backend_media:
  backend_staticfiles:
  backend_data:
  certbot_conf:
  certbot_www:
